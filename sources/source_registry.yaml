  - id: wfi-positive-welfare-2024
    title: >
      Beyond Suffering: A Framework for Quantifying Positive Animal
      Welfare in Individuals and Populations
    status: public-wfi-publication
    role: positive-welfare-source
    citation:
      authors: "Alonso, W. J., & Schuck-Paim, C."
      year: 2024
      doi: "10.17605/OSF.IO/MDGJR"
      url: "https://welfarefootprint.org/2024/03/12/positive-animal-welfare/"
      preferred_format: >
        Alonso, W. J., & Schuck-Paim, C. (2024). Beyond Suffering: A Framework
        for Quantifying Positive Animal Welfare in Individuals and Populations.
        Welfare Footprint Institute.
        https://doi.org/10.17605/OSF.IO/MDGJR
    canonical_use:
      - Operational definition of Pleasure
      - Pleasure intensity categories
      - Pleasure-Track method and notation
      - Cumulative Pleasure construct
      - Rule that Pain and Pleasure are not assumed to be equivalent or netted
      - canon/intensity_categories_pleasure.md
    notes: >
      Primary source for positive affect constructs in WFF.
      canon/intensity_categories_pleasure.md cannot be substantively
      filled until this source is reviewed and its content approved
      for canon inclusion via a reviewed PR.
      Pain-Track remains a valid WFF term for the method, notation,
      app, and negative-affect-specific workflows. This source covers
      the complementary Pleasure-Track constructs.
    review_status: active

  - id: wfi-metrics-vs-indicators-2023
    title: >
      Welfare Metrics and Welfare Indicators: Clarifying Essential Concepts
      in Animal Welfare Assessment
    status: public-wfi-publication
    role: metrics-indicators-source
    citation:
      authors: "Alonso, W. J., & Schuck-Paim, C."
      year: 2023
      doi: "10.17605/OSF.IO/AQ2BM"
      url: "https://welfarefootprint.org/2023/05/31/welfare-metrics-vs-welfare-indicators/"
      preferred_format: >
        Alonso, W. J., & Schuck-Paim, C. (2023). Welfare Metrics and Welfare
        Indicators: Clarifying Essential Concepts in Animal Welfare Assessment.
        Welfare Footprint Institute.
        https://doi.org/10.17605/OSF.IO/AQ2BM
    canonical_use:
      - Distinction between welfare indicators as empirical/proxy measurements
        and welfare metrics as quantitative constructs informed by indicators
      - canon/terminology.md (Welfare Indicator and Welfare Metric entries)
      - modules/ii_veterinary_inventory.md (required distinctions)
    notes: >
      Grounds the methodologically critical distinction between welfare
      indicators (empirical proxies) and welfare metrics (quantitative
      constructs) in canon/terminology.md and Module II.
      If any wording in this source contradicts current canon, flag in
      review/source_conflicts.md.
    review_status: active

  - id: wfi-ai-tools-applications
    title: "AI Tools & Applications"
    status: public-wfi-resource
    role: ai-tools-reference
    citation:
      authors: "Welfare Footprint Institute"
      year: 2026
      url: "https://welfarefootprint.org/ai-tools-applications/"
      preferred_format: >
        Welfare Footprint Institute. (2026). AI Tools & Applications.
        https://welfarefootprint.org/ai-tools-applications/
    canonical_use:
      - Current names and scope of WFI AI tools
      - Zootechnical Mapper GPT
      - AffectMap GPT
      - Hedonic-Track GPT (current tool supporting full welfare analysis,
        including Pain-Tracks and Pleasure-Tracks)
      - Interspecific Affect GPT
      - Epidemiology for Animal Welfare GPT
      - Neurophilosopher GPT
      - Food Welfare Explorer
      - glossary/deprecated_terms.yaml (Pain-Track GPT → Hedonic-Track GPT entry)
    notes: >
      This page identifies Hedonic-Track GPT as the current tool supporting
      full welfare analysis, including Pain-Tracks and Pleasure-Tracks.
      Pain-Track remains a valid and important WFF term for the method,
      notation, app, and negative-affect-specific workflows. Only the
      specific Custom GPT tool name changed from "Pain-Track GPT" to
      "Hedonic-Track GPT."
    review_status: active
