# WFI Source Registry
# Tracks the authoritative sources that inform WFF canon.
# Entries here do not automatically become canon.
# All canon updates from these sources require reviewed PRs.
#
# Schema version: 0.1
# Last updated: 2026-05-12
# Maintainers: Wladimir J. Alonso, Cynthia Schuck-Paim
#
# Field definitions:
#   id:             unique slug for this source
#   title:          full title of the source document
#   status:         publication status (preprint-under-review | public-wfi-resource |
#                   public-wfi-publication | internal-document)
#   role:           what this source provides to the canon
#   citation:       bibliographic details
#   canonical_use:  list of canon files or constructs this source informs
#   notes:          usage guidance, terminology warnings, or caveats
#   review_status:  whether this entry has been verified (active | pending-review)

schema_version: "0.1"
last_updated: "2026-05-12"

sources:

  - id: wff-methodological-foundations-2025
    title: >
      Welfare Footprint Framework: Methodological Foundations and
      Quantitative Assessment Guidelines
    status: preprint-under-review
    role: primary-methodological-source
    citation:
      authors: "Alonso, W. J., & Schuck-Paim, C."
      year: 2025
      publisher: "Center for Welfare Metrics (São Paulo)"
      doi: "10.17605/osf.io/94bxs"
      url: "https://doi.org/10.17605/osf.io/94bxs"
      journal_submission: "Under review at Animal Sentience"
      preferred_format: >
        Alonso, W. J., & Schuck-Paim, C. (2025). Welfare Footprint Framework:
        Methodological Foundations and Quantitative Assessment Guidelines.
        Center for Welfare Metrics (São Paulo).
        https://doi.org/10.17605/osf.io/94bxs
    canonical_use:
      - Full WFF framework and module structure (Modules I–VI + Ψ)
      - Notation standards and formal expressions
      - Methodological guidelines for all assessment steps
      - canon/principles.md
      - canon/terminology.md
      - canon/uncertainty_principles.md
      - modules/ (all)
    notes: >
      This is the primary citation for all WFF methodology until the
      Animal Sentience journal version is published. Use this OSF preprint;
      do not cite older internal drafts when this preprint is intended.
      The updated primary methodological source (re-read 2026-05-14) uses
      "Econometric Calculation" for Module V — this is the current canonical
      term in this repository. "Aggregation and Standardization" appeared in
      earlier repository scaffolding and is deprecated; treat that term as
      superseded terminology where it appears in older drafts.
    review_status: active

  - id: wfi-technical-definitions
    title: "Welfare Footprint Framework: Technical Definitions and Concepts"
    status: public-wfi-resource
    role: terminology-source
    citation:
      authors: "Welfare Footprint Institute"
      year: 2026
      url: "https://welfarefootprint.org/technical-definitions/"
      preferred_format: >
        Welfare Footprint Institute. (2026). Welfare Footprint Framework:
        Technical Definitions and Concepts.
        https://welfarefootprint.org/technical-definitions/
    canonical_use:
      - Operational definitions of WFF terms and modules
      - canon/terminology.md
      - glossary/wff_terms.yaml
    notes: >
      This page provides the terminology used in the Welfare Footprint
      Framework and operational definitions. The updated Technical
      Definitions source (re-read 2026-05-14) uses "Econometric Calculation"
      for Module V, aligned with current canon. If any definition here
      contradicts current canon wording, do not silently resolve; flag in
      review/source_conflicts.md.
    review_status: active

