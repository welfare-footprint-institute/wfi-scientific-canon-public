# WFI Source Registry
# Tracks scientific and operational sources used to represent the WFF publicly.
#
# Authority hierarchy:
#   1. Primary WFF methodological paper
#   2. Formal amendments/addenda jointly approved by Wladimir and Cynthia
#   3. Internal canon as controlled operational representation
#   4. This public mirror
#   5. Downstream tools
#
# Registry inclusion does not make a source part of the WFF and does not
# authorize a methodological change. Substantive WFF amendments require the
# joint scientific process in sources/wff_scientific_authority.md.
#
# Schema version: 0.2
# Last updated: 2026-06-22
# Scientific authorities: Wladimir J. Alonso and Cynthia Schuck-Paim, jointly

schema_version: "0.2"
last_updated: "2026-06-22"
scientific_authority_policy: sources/wff_scientific_authority.md

sources:

  - id: wff-methodological-foundations-2025
    title: >
      Welfare Footprint Framework: Methodological Foundations and
      Quantitative Assessment Guidelines
    status: preprint-under-review
    role: ultimate-current-methodological-source
    citation:
      authors: "Alonso, W. J., & Schuck-Paim, C."
      year: 2025
      publisher: "Center for Welfare Metrics (São Paulo)"
      doi: "10.17605/osf.io/94bxs"
      url: "https://doi.org/10.17605/osf.io/94bxs"
      journal_submission: "Under review at Animal Sentience"
      preferred_format: >
        Alonso, W. J., & Schuck-Paim, C. (2025). Welfare Footprint Framework:
        Methodological Foundations and Quantitative Assessment Guidelines.
        Center for Welfare Metrics (São Paulo).
        https://doi.org/10.17605/osf.io/94bxs
    canonical_use:
      - Ultimate current authority for the full WFF framework
      - Module structure (Modules I–VI + Ψ)
      - Notation standards and formal expressions
      - Methodological guidelines for all assessment steps
      - Public representation in canon/ and modules/
    notes: >
      This is the controlling scientific source for WFF methodology until a
      peer-reviewed journal version supersedes it. Public files must remain
      faithful to it unless a formal amendment or addendum has been jointly
      approved by Wladimir J. Alonso and Cynthia Schuck-Paim and represented in
      the internal canon.
    review_status: active

