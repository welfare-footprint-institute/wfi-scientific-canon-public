schema_version: "0.2"
repository: wfi-scientific-canon-public
organization: welfare-footprint-institute
url: https://github.com/welfare-footprint-institute/wfi-scientific-canon-public
description: >
  Curated public mirror of the Welfare Footprint Institute scientific canon.
  It presents the current public representation of WFF methodology,
  terminology, module descriptions, source relationships, and review status.
  It is not the ultimate scientific authority for the WFF.

ai_connector_index: canon_index.yaml
repository_type: public-mirror
purpose: >
  Public teaching, citation, review, and retrieval mirror of the internal WFI
  scientific canon. The primary WFF methodological paper and any formally
  adopted amendments remain scientifically superior to both the private and
  public repositories. This mirror may lag internal development.

scientific_authority:
  primary_source:
    id: wff-methodological-foundations-2025
    file: sources/wff_scientific_authority.md
    citation_policy: sources/citation_policy.md
  amendment_rule: joint_approval_required
  scientific_authorities:
    - Wladimir J. Alonso
    - Cynthia Schuck-Paim
  rule: >
    Foundational WFF scientific content may be amended only through an explicit,
    controlled scientific record jointly approved by Wladimir J. Alonso and
    Cynthia Schuck-Paim. Public Issues and Pull Requests do not themselves
    create or revise WFF scientific authority.

repository_role:
  type: curated-public-mirror
  immediate_source: wfi-scientific-canon
  does_not_authorize:
    - Independent revision of WFF scientific content
    - Public propagation of substantive changes before internal approval

source_snapshot:
  commit: "d0ea621db2f3ef9b4db82c91ad4fade780224f4b"
  note: >
    Content reflects the WFI scientific canon as of this source snapshot
    commit. The public mirror is rebuilt from curated current files and does
    not reproduce the internal repository's commit history.

canonical_chain:
  - Circumstances
  - Biological Consequences
  - Affective Experiences
  - Welfare Metrics

primary_welfare_constructs:
  - Cumulative Pain
  - Cumulative Pleasure

modules:
  - id: "I"
    name: Zootechnical Description
    file: modules/i_zootechnical_description.md

  - id: "II"
    name: Veterinary Inventory
    file: modules/ii_veterinary_inventory.md

  - id: "III"
    name: Affective Quantification
    file: modules/iii_affective_quantification.md

  - id: "IV"
    name: Epidemiological Review
    file: modules/iv_epidemiological_review.md

  - id: "V"
    name: Econometric Calculation
    deprecated_name: Aggregation and Standardization
    file: modules/v_econometric_calculation.md

  - id: "VI"
    name: "Welfare Footprints: Expression and Notation"
    file: modules/vi_expression_notation.md

  - id: "Ψ"
    name: Interspecific Scaling / Interspecific Affect
    file: modules/psi_interspecific_scaling.md

primary_citation:
  authors: "Alonso, W. J., & Schuck-Paim, C."
  year: 2025
  title: >
    Welfare Footprint Framework: Methodological Foundations and
    Quantitative Assessment Guidelines
  publisher: "Center for Welfare Metrics (São Paulo)"
  doi: "10.17605/osf.io/94bxs"
  url: "https://doi.org/10.17605/osf.io/94bxs"
  status: "preprint-under-review — cite OSF preprint until Animal Sentience version published"
  authority: ultimate-current-scientific-source

sources:
  registry: sources/source_registry.yaml
  citation_policy: sources/citation_policy.md
  scientific_authority: sources/wff_scientific_authority.md

scope_exclusions:
  - Atlas
  - WFKG
  - schemas and validators
  - MCP servers
  - agents
  - dashboards
  - product code
  - content studio
  - ops assistant infrastructure
  - workshop materials
