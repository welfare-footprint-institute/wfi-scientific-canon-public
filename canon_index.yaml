  - id: module_iii
    path: modules/iii_affective_quantification.md
    title: "Module III: Affective Quantification"
    role: module
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: ["III"]
    tags: [module, affective_experiences, quantification]
    recommended_use: >
      Read for the Module III specification (Affective Experiences). This is the
      step where the WFF chain contacts the morally relevant quantity. Status is
      scaffold for scientific review.

  - id: module_iv
    path: modules/iv_epidemiological_review.md
    title: "Module IV: Epidemiological Review"
    role: module
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: ["IV"]
    tags: [module, epidemiology, review]
    recommended_use: >
      Read for the Module IV specification (Epidemiological Review). Status is
      scaffold for scientific review.

  - id: module_v
    path: modules/v_econometric_calculation.md
    title: "Module V: Econometric Calculation"
    role: module
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: ["V"]
    tags: [module, econometric, calculation]
    recommended_use: >
      Read for the Module V specification (Econometric Calculation; formerly
