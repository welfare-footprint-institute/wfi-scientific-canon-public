  - id: module_vi
    path: modules/vi_expression_notation.md
    title: "Module VI: Welfare Footprints — Expression and Notation"
    role: module
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
