  - id: resolved_methodological_decisions
    path: review/resolved_methodological_decisions.md
    title: Resolved Methodological Decisions
    role: resolved_review
    status: resolved_review_record
    exposure_level: public_optional
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [review, resolved, methodology, governance]
    recommended_use: >
      Read to see WFF methodological questions that have been explicitly resolved.
      Useful to clarify interpretation of current canon files. This is a resolved
      review record, not open review material, and is not part of the core
      default bundles.

bundles:
  - id: core_orientation
    title: Core orientation
    description: Basic repository orientation and AI-use rules.
    entry_ids:
      - readme
      - ai_use
      - canon_map
      - readme_for_agents
      - manifest

  - id: core_methodology
    title: Core WFF methodology
    description: Core principles, evidence and uncertainty guidance, terminology, intensity categories, visualization conventions, and module specifications.
    entry_ids:
      - canon_principles
      - terminology
      - pain_intensity_categories
      - pleasure_intensity_categories
      - evidence_standards
      - uncertainty_principles
      - scientific_lane
      - visualization_conventions
      - intensity_colors
      - module_i
      - module_ii
      - module_iii
      - module_iv
      - module_v
      - module_vi
      - module_psi

  - id: terminology_and_deprecations
    title: Terminology and deprecated terms
    description: Core terminology plus machine-readable deprecated-term guidance.
    entry_ids:
      - terminology
      - wff_terms
      - deprecated_terms

  - id: modules
    title: WFF modules
    description: Module files for the WFF analytical workflow.
    entry_ids:
      - module_i
      - module_ii
      - module_iii
      - module_iv
      - module_v
      - module_vi
      - module_psi

  - id: source_governance
    title: Source and citation governance
    description: Source registry and citation policy.
    entry_ids:
      - source_registry
      - citation_policy

  - id: resolved_methodology
    title: Resolved methodological decisions
    description: Resolved review decisions that may clarify interpretation of current canon files.
    entry_ids:
      - resolved_methodological_decisions
