  - id: module_psi
    path: modules/psi_interspecific_scaling.md
    title: "Module Ψ: Interspecific Scaling / Interspecific Affect"
    role: module
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: ["Ψ"]
    tags: [module, interspecific_scaling, psi, high_uncertainty]
    recommended_use: >
      Read for the Module Ψ specification (Interspecific Scaling). Status is an
      open scaffold with high uncertainty requiring extensive scientific review;
      present its claims with strong uncertainty caveats.

  - id: source_registry
    path: sources/source_registry.yaml
    title: Source Registry (machine-readable)
    role: source_governance
    status: reference
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/yaml
    wff_modules: []
    tags: [sources, registry, governance, machine_readable]
    recommended_use: >
      Use to look up the authoritative sources that inform WFF canon. Entries in
      the registry do not automatically become canon.

  - id: citation_policy
    path: sources/citation_policy.md
