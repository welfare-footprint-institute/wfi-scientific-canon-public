schema_version: "0.1"
index_id: wfi-scientific-canon-public-index
title: WFI Scientific Canon Public Index
description: >
  Machine-readable retrieval index for AI connectors and MCP-compatible clients.
  This file contains metadata only. It does not replace the canon files and does
  not duplicate their scientific content. Each entry's status field reflects the
  status declared inside that file (for example "Draft for scientific review" or
  "Scaffold for scientific review") and must be preserved so that AI clients do
  not present draft or scaffold material as settled canon.

source_repository:
  organization: welfare-footprint-institute
  repository: wfi-scientific-canon-public
  branch: main
  raw_base_url: https://raw.githubusercontent.com/welfare-footprint-institute/wfi-scientific-canon-public/main

access_policy:
  default: read_only
  allowed_operations:
    - list_index
    - read_indexed_entries
    - read_indexed_bundles
    - search_index_metadata
  forbidden_operations:
    - write
    - create_issue
    - create_pull_request
    - modify_repository
    - fetch_unindexed_paths
    - fetch_arbitrary_urls
    - access_private_repositories

# NOTE ON REVIEW/GOVERNANCE FILES
# The repository also contains review/open_questions.md, review/source_conflicts.md,
# review/follow_up_items.md, and review/unresolved_methodological_issues.md. These
# are intentionally NOT indexed here. They track open, unresolved, and in-flight
# review material and should not be retrieved by default AI clients as if they were
# canon. If they are ever exposed to connectors in the future, they must be marked
# exposure_level: public_review_governance and kept out of default bundles.

entries:
  - id: readme
    path: README.md
    title: Repository README
    role: orientation
    status: current_public
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [orientation, overview, public_mirror]
    recommended_use: >
      Read first to understand what this public mirror is, what it contains, and
      how it relates to the internal working canon.

  - id: ai_use
    path: AI_USE.md
    title: AI Use Rules
    role: ai_use_rules
    status: current_public
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [ai_use, rules, guardrails, orientation]
    recommended_use: >
      Read before generating or interpreting WFF content. Defines how AI systems
      may and may not use the canon, including the rule not to collapse Pain and
      Pleasure into a single score.

  - id: canon_map
    path: CANON_MAP.md
    title: Canon Map
    role: orientation
    status: current_public
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [orientation, map, navigation]
    recommended_use: >
      Use as a navigation map of the canon's structure and the relationships
      between files before retrieving specific entries.

  - id: readme_for_agents
    path: README_FOR_AGENTS.md
    title: README for Agents
    role: orientation
    status: current_public
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [orientation, agents, ai_use]
    recommended_use: >
      Read to understand how automated agents and AI clients are expected to
      consume the canon responsibly.

  - id: manifest
    path: manifest.yaml
    title: Repository Manifest
    role: manifest
    status: current_public
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/yaml
    wff_modules: []
    tags: [manifest, metadata, structure]
    recommended_use: >
      Read for the authoritative public-mirror framing, the canonical chain,
      the module list, and the primary citation. The manifest is the existing
      repository descriptor; this index is the AI-connector discovery layer.

  - id: citation
    path: CITATION.cff
    title: Citation Metadata
    role: citation
    status: reference
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/yaml
    wff_modules: []
    tags: [citation, metadata, reference]
    recommended_use: >
      Use to cite the Welfare Footprint Framework correctly. Defer to the
      citation policy for citation standards.

  - id: license
    path: LICENSE.md
    title: License
    role: license
    status: reference
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [license, reference, terms]
    recommended_use: >
      Read to understand the terms under which this public canon may be used and
      redistributed.

  - id: canon_principles
    path: canon/principles.md
    title: Canon Core Principles
    role: canon_principles
    status: draft_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [principles, methodology, canon]
    recommended_use: >
      Read to understand the core WFF principles. Status is draft for scientific
      review; present as draft canon, not settled doctrine.

  - id: terminology
    path: canon/terminology.md
    title: Core Terminology
    role: terminology
    status: draft_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [terminology, definitions, canon]
    recommended_use: >
      Read to align on canonical WFF terminology for human readers. Pair with the
      machine-readable wff_terms and deprecated_terms glossaries.

  - id: pain_intensity_categories
    path: canon/intensity_categories_pain.md
    title: Pain Intensity Categories
    role: intensity_categories
    status: draft_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [pain, intensity_categories, affective_states, methodology]
    recommended_use: >
      Read for the canonical Pain intensity categories. Keep Pain categories
      distinct from Pleasure categories; do not merge them into a single scale.

  - id: pleasure_intensity_categories
    path: canon/intensity_categories_pleasure.md
    title: Pleasure Intensity Categories
    role: intensity_categories
    status: draft_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [pleasure, intensity_categories, affective_states, methodology]
    recommended_use: >
      Read for the canonical Pleasure intensity categories. Keep Pleasure
      categories distinct from Pain categories; do not merge them into a single
      scale.

  - id: evidence_standards
    path: canon/evidence_standards.md
    title: Evidence Standards
    role: evidence_standards
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: ["III", "IV", "Ψ"]
    tags: [evidence, standards, methodology, review]
    recommended_use: >
      Read for provisional evidence-evaluation guidance. This file is a skeleton
      requiring scientific review; do not present its provisional hierarchy or
      placeholders as settled standards.

  - id: uncertainty_principles
    path: canon/uncertainty_principles.md
    title: Uncertainty Principles
    role: uncertainty
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [uncertainty, assumptions, methodology, evidence]
    recommended_use: >
      Read for current uncertainty-handling principles. This file is a skeleton
      requiring scientific review; preserve its uncertainty distinctions and do
      not treat placeholder protocols as finalized.

  - id: scientific_lane
    path: canon/scientific_lane.md
    title: WFI Scientific Lane
    role: scientific_scope
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [scientific_lane, scope, communication, governance]
    recommended_use: >
      Read for the provisional boundary between WFI scientific outputs and
      institutional moral or policy conclusions. This file is a skeleton requiring
      scientific review.

  - id: visualization_conventions
    path: canon/visualization_conventions.md
    title: Visualization Conventions
    role: visualization
    status: draft_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: []
    tags: [visualization, conventions, presentation]
    recommended_use: >
      Read before rendering or describing WFF visualizations to follow the
      canonical conventions for representing intensity and affective states.

  - id: intensity_colors
    path: visualization/intensity_colors.yaml
    title: WFF Intensity Colors (machine-readable)
    role: visualization_palette
    status: reference
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/yaml
    wff_modules: []
    tags: [visualization, colors, intensity_categories, machine_readable]
    recommended_use: >
      Use as the derived machine-readable palette for WFF visualizations. The
      human-readable canon tables remain authoritative.

  - id: wff_terms
    path: glossary/wff_terms.yaml
    title: WFF Canonical Terms (machine-readable)
    role: glossary
    status: draft_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/yaml
    wff_modules: []
    tags: [glossary, terminology, machine_readable]
    recommended_use: >
      Use as the machine-readable source of canonical WFF terms. Human-readable
      context lives in the terminology entry.

  - id: deprecated_terms
    path: glossary/deprecated_terms.yaml
    title: Deprecated Terms (machine-readable)
    role: glossary
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/yaml
    wff_modules: []
    tags: [glossary, deprecated, terminology, machine_readable]
    recommended_use: >
      Use to detect superseded terms that must not be used in new canon and to
      find their preferred replacements. Status is skeleton/scaffold pending
      scientific review.

  - id: module_i
    path: modules/i_zootechnical_description.md
    title: "Module I: Zootechnical Description"
    role: module
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: ["I"]
    tags: [module, circumstances, zootechnical]
    recommended_use: >
      Read for the Module I specification (Circumstances). Status is scaffold for
      scientific review; treat as a scaffold, not finalized methodology.

  - id: module_ii
    path: modules/ii_veterinary_inventory.md
    title: "Module II: Veterinary Inventory"
    role: module
    status: scaffold_for_scientific_review
    exposure_level: public_default
    ai_accessible: true
    mime_type: text/markdown
    wff_modules: ["II"]
    tags: [module, biological_consequences, veterinary]
    recommended_use: >
      Read for the Module II specification (Biological Consequences). Status is
